name: Release

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'adopt'
        check-latest: false

    - name: Build with Maven
      run: mvn -B install -DskipTests

    - name: Read version
      run: |
        RELEASE_TAG=$(cat ./src/main/resources/.version)
        RELEASE_VER=${RELEASE_TAG#v}
        echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
        echo "RELEASE_VER=$RELEASE_VER" >> $GITHUB_ENV

    # （可选）GitHub Release
    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        artifacts: ./target/miz-translator-release.tar.gz,./target/miz-translator-release.zip,./target/miz-translator-update.zip
        tag: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_TAG }}
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}